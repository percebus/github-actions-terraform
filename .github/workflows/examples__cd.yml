name: "[C]ontinuous [D]elivery"

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
  push:
    branches:
      - main

concurrency:
  # NOTE: Apparently terraform init or test does NOT create a lock.
  group: default
  cancel-in-progress: false

# SRC: https://github.com/EnricoMi/publish-unit-test-result-action?tab=readme-ov-file#permissions
# SRC: https://github.com/dorny/test-reporter?tab=readme-ov-file#recommended-setup-for-public-repositories
permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

jobs:
  setup:
    name: setup
    runs-on: ubuntu-latest
    steps:
      - name: GITHUB_OUTPUT
        id: set_variables
        run: |
          echo "STACK_ID=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT
    outputs:
      STACK_ID: ${{ steps.set_variables.outputs.STACK_ID }}

  test:
    name: terraform
    needs: setup
    uses: ./.github/workflows/test.yml
    with:
      override: true
      tflint-version: latest
      TF_CLI_ARGS_init: ${{ needs.setup.outputs.TF_CLI_ARGS_init }}

  #
  integration_tests:
    name: terraform
    needs:
      - setup
      - test
    uses: ./.github/workflows/integration_tests.yml
    secrets:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
    # with:
    #   environment: test
    #   TF_CLI_ARGS_init: ${{ needs.setup.outputs.TF_CLI_ARGS_init }}
    #   TF_CLI_ARGS_test: ${{ needs.setup.outputs.TF_CLI_ARGS_test }}

  ci_apply:
    name: "terraform @ ci-main"
    needs:
      - setup
      - integration_tests
    uses: ./.github/workflows/plan_and_apply.yml
    secrets:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
    with:
      environment: ci-main
      features_directory: features
      TF_CLI_ARGS_plan: "-var STACK_ID=${{ needs.setup.outputs.STACK_ID }}"

  ci_destroy:
    name: "terraform @ ci-main"
    needs: ci_apply
    uses: ./.github/workflows/apply.yml
    if: always()
    secrets:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
    with:
      environment: ci-main
      destroy: true

  dev_apply:
    name: "terraform @ dev"
    needs: ci_apply
    uses: ./.github/workflows/plan_and_apply.yml
    secrets:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
    with:
      environment: dev
      TF_CLI_ARGS_plan: "-var STACK_ID=${{ needs.setup.outputs.STACK_ID }}"
      features_directory: features

  dev_validate:
    name: "validate @ dev"
    needs: dev_apply
    runs-on: ubuntu-latest
    steps:
      - name: pass
        run: exit 0

  prod_apply:
    name: "terraform @ prod"
    needs: dev_validate
    uses: ./.github/workflows/plan_and_apply.yml
    secrets:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
    with:
      environment: prod
      TF_CLI_ARGS_apply: "-input=false -auto-approve"
      features_directory: features

  prod_validate:
    name: "validate @ prod"
    needs: prod_apply
    runs-on: ubuntu-latest
    steps:
      - name: pass
        run: exit 0
