name: "Test actions/test"

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
  pull_request:
  push:
    branches:
      - main

concurrency:
  # NOTE: Cancelling an apply might corrupt the state.
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  default:
    name: terraform test
    runs-on: ubuntu-latest
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/init
        with:
          override: true

      - uses: ./.github/actions/test

  TF_CLI_ARGS_test__matrix:
    needs: default
    runs-on: ubuntu-latest
    strategy:
      matrix:
        TF_CLI_ARGS_test:
          - "-test-directory=./terra/tests -var ENVIRONMENT=bananas"
          - "-test-directory=./assets/terra/tests"
          - "-test-directory=./terra/tests -junit-xml=junit.xml"

    name: terraform test ${{ matrix.TF_CLI_ARGS_test }}
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/init
        with:
          override: true

      - uses: ./.github/actions/test
        with:
          TF_CLI_ARGS_test: ${{ matrix.TF_CLI_ARGS_test }}
