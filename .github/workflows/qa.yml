name: "[Q]uality [A]ssurance"

on:
  workflow_call: # SRC: https://docs.github.com/en/actions/using-workflows/reusing-workflows
    secrets:
      TF_API_TOKEN:
        description: Terraform Cloud API token
        required: false

    inputs:
      ref:
        description: The branch, tag or SHA to checkout.
        type: string
        required: false
        default: ""

      working-directory:
        description: -chdir
        type: string
        required: false
        default: ./terra

      TF_CLI_ARGS_init:
        description: TF_CLI_ARGS_init
        type: string
        required: false
        default: "-input=false -reconfigure"

      tflint-version:
        description: tflint version
        type: string
        required: false
        default: ""

      test_environment:
        description: environment
        type: string
        required: false
        default: test

      unit_tests_directory:
        description: terraform test
        type: string
        required: false
        default: ""

      integration_tests_directory:
        description: integration tests directory
        type: string
        required: false
        default: ""

      environment:
        description: environment
        type: string
        required: true

      TF_CLI_ARGS_plan:
        description: TF_CLI_ARGS_plan
        type: string
        required: false
        default: ""

      features_directory:
        description: terraform-compliance
        type: string
        required: false
        default: ""

      TF_CLI_ARGS_apply:
        description: TF_CLI_ARGS_apply
        type: string
        required: false
        default: "-input=false"

  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
    inputs:
      ref:
        description: The branch, tag or SHA to checkout.
        type: string
        required: false
        default: ""

      working-directory:
        description: -chdir
        type: string
        required: false
        default: ./terra

      TF_CLI_ARGS_init:
        description: TF_CLI_ARGS_init
        type: string
        required: false
        default: "-input=false -reconfigure"

      tflint-version:
        description: tflint version
        type: string
        required: false
        default: ""

      test_environment:
        description: environment
        type: string
        required: false
        default: test

      unit_tests_directory:
        description: terraform test
        type: string
        required: false
        default: ""

      integration_tests_directory:
        description: integration tests directory
        type: string
        required: false
        default: ""

      environment:
        description: environment
        type: string
        required: true

      TF_CLI_ARGS_plan:
        description: TF_CLI_ARGS_plan
        type: string
        required: false
        default: ""

      features_directory:
        description: terraform-compliance
        type: string
        required: false
        default: ""

      TF_CLI_ARGS_apply:
        description: TF_CLI_ARGS_apply
        type: string
        required: false
        default: "-input=false"

env:
  TF_IN_AUTOMATION: true

# SRC: https://github.com/EnricoMi/publish-unit-test-result-action?tab=readme-ov-file#permissions
# SRC: https://github.com/dorny/test-reporter?tab=readme-ov-file#recommended-setup-for-public-repositories
permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: "env: local"
    runs-on: ubuntu-latest
    # NOTE: Copy from
    # uses: percebus/github-actions-terraform/.github/workflows/test.yml@main
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: percebus/github-actions-terraform/.github/actions/setup@main
      - uses: percebus/github-actions-tflint/.github/actions/setup@main
        if: ${{ inputs.tflint-version != '' }}
        with:
          tflint-version: ${{ inputs.tflint-version }}

      - uses: percebus/github-actions-terraform/.github/actions/fmt-check@main
        with:
          working-directory: ${{ inputs.working-directory }}

      - uses: percebus/github-actions-terraform/.github/actions/init@main
        with:
          working-directory: ${{ inputs.working-directory }}
          override: true
          TF_CLI_ARGS_init: ${{ inputs.TF_CLI_ARGS_init }}

      - uses: percebus/github-actions-terraform/.github/actions/validate@main
        with:
          working-directory: ${{ inputs.working-directory }}

      - uses: percebus/github-actions-tflint/.github/actions/init_and_run@main
        if: ${{ inputs.tflint-version != '' }}
        with:
          working-directory: ${{ inputs.working-directory }}

      - uses: percebus/github-actions-terraform/.github/actions/test@main
        if: ${{ inputs.unit_tests_directory != '' }}
        with:
          working-directory: ${{ inputs.working-directory }}
          TF_CLI_ARGS_test: "-test-directory=${{ inputs.unit_tests_directory }} -var-file=env/${{ inputs.test_environment }}.tfvars -junit-xml=test-results.xml"

      - uses: percebus/github-actions-testing/.github/actions/junit@main
        if: ${{ inputs.unit_tests_directory != '' }}
        with:
          files_pattern: ${{ inputs.working-directory }}/**/*.xml
          # test-reporter inputs
          reporter: jest-junit
          tests_name: terraform test
          list-suites: all
          list-tests: failed
          # test-summary inputs
          summary_title: "terraform test Summary"
          # publish-test-deltas inputs
          publish-test-deltas: true
          comment_title: "`terraform test` Deltas"
          check_name: "terraform test Deltas"

  #
  test__integration_tests:
    name: "env: ${{ inputs.test_environment }}"
    needs: test
    if: |
      (inputs.integration_tests_directory != '') &&
      (needs.test.result == 'skipped' || needs.test.result == 'success')
    uses: percebus/github-actions-terraform/.github/workflows/integration_tests.yml@main
    secrets:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
    with:
      ref: ${{ inputs.ref }}
      working-directory: ${{ inputs.working-directory }}
      environment: ${{ inputs.test_environment }}
      TF_CLI_ARGS_init: ${{ inputs.TF_CLI_ARGS_init }}
      TF_CLI_ARGS_test: "-test-directory=${{ inputs.integration_tests_directory }} -var-file=env/${{ inputs.test_environment }}.tfvars -junit-xml=test-results.xml"

  #
  plan_and_apply:
    name: "env: ${{ inputs.environment }}"
    needs: test__integration_tests
    if: |
      (inputs.environment != '') &&
      (needs.test__integration_tests.result == 'skipped' || needs.test.test__integration_tests.result == 'success')
    uses: ./.github/workflows/plan_and_apply.yml
    secrets:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
    with:
      environment: ${{ inputs.environment }}
      ref: ${{ inputs.ref }}
      features_directory: ${{ inputs.features_directory }}
      TF_CLI_ARGS_plan: "${{ inputs.TF_CLI_ARGS_plan }}"
      TF_CLI_ARGS_apply: "${{ inputs.TF_CLI_ARGS_apply }}"

  #
  apply-destroy:
    name: "env: ${{ inputs.environment }}"
    needs: plan_and_apply
    uses: ./.github/workflows/apply.yml
    if: always() && ${{ inputs.environment != '' }}
    secrets:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
    with:
      environment: ${{ inputs.environment }}
      ref: ${{ inputs.ref }}
      destroy: true
