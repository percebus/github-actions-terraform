name: terraform test

on:
  workflow_call: # SRC: https://docs.github.com/en/actions/using-workflows/reusing-workflows
    inputs:
      ref:
        description: The branch, tag or SHA to checkout.
        type: string
        required: false
        default: ""

      working-directory:
        description: -chdir
        type: string
        required: false
        default: ./terra

      override:
        description: override.tf
        type: boolean
        required: false
        default: true

      TF_CLI_ARGS_init:
        description: TF_CLI_ARGS_init
        type: string
        required: false
        default: "-input=false -reconfigure"

      tflint-version:
        description: tflint version
        type: string
        required: false
        default: ""

      TF_CLI_ARGS_test:
        description: TF_CLI_ARGS_test
        type: string
        required: false
        default: "-var-file=env/test.tfvars -junit-xml=test-results.xml"

  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
    inputs:
      ref:
        description: The branch, tag or SHA to checkout.
        type: string
        required: false
        default: ""

      working-directory:
        description: -chdir
        type: string
        required: false
        default: ./terra

      override:
        description: override.tf
        type: boolean
        required: false
        default: true

      TF_CLI_ARGS_init:
        description: TF_CLI_ARGS_init
        type: string
        required: false
        default: "-input=false -reconfigure"

      tflint-version:
        description: tflint version
        type: string
        required: false
        default: ""

      TF_CLI_ARGS_test:
        description: TF_CLI_ARGS_test
        type: string
        required: false
        default: "-var-file=env/test.tfvars -junit-xml=test-results.xml"

env:
  TF_IN_AUTOMATION: true

# SRC: https://github.com/EnricoMi/publish-unit-test-result-action?tab=readme-ov-file#permissions
# SRC: https://github.com/dorny/test-reporter?tab=readme-ov-file#recommended-setup-for-public-repositories
permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: percebus/github-actions-terraform/.github/actions/setup@main

      - uses: percebus/github-actions-terraform/.github/actions/fmt-check@main
        with:
          working-directory: ${{ inputs.working-directory }}

      - uses: percebus/github-actions-terraform/.github/actions/init@main
        with:
          working-directory: ${{ inputs.working-directory }}
          override: ${{ inputs.override }}
          TF_CLI_ARGS_init: ${{ inputs.TF_CLI_ARGS_init }}

      - uses: percebus/github-actions-terraform/.github/actions/validate@main
        with:
          working-directory: ${{ inputs.working-directory }}

      - uses: percebus/github-actions-tflint/.github/actions/setup@main
        if: ${{ inputs.tflint-version != '' }}
        with:
          tflint-version: ${{ inputs.tflint-version }}

      - uses: percebus/github-actions-tflint/.github/actions/init_and_run@main
        if: ${{ inputs.tflint-version != '' }}
        with:
          working-directory: ${{ inputs.working-directory }}

      # TODO? break into `terraform -command=plan` & apply?
      - uses: percebus/github-actions-terraform/.github/actions/test@main
        with:
          working-directory: ${{ inputs.working-directory }}
          TF_CLI_ARGS_test: ${{ inputs.TF_CLI_ARGS_test }}

      - uses: percebus/github-actions-testing/.github/actions/junit@main
        with:
          files_pattern: ${{ inputs.working-directory }}/**/*.xml
          # test-reporter inputs
          reporter: jest-junit
          tests_name: terraform test
          list-suites: all
          list-tests: failed
          # test-summary inputs
          summary_title: "terraform test Summary"
          # publish-test-deltas inputs
          publish-test-deltas: true
          comment_title: "`terraform test` Deltas"
          check_name: "terraform test Deltas"
